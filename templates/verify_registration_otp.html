<!DOCTYPE html>
<html>
<head>

<title>Verify OTP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#eef2ff,#c7d2fe);
font-family:Poppins;
}

.box{
width:360px;
padding:40px;
background:white;
border-radius:18px;
box-shadow:0px 20px 45px rgba(0,0,0,.12);
}

.resend{
font-size:14px;
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<form method="POST" class="box">

<h4 class="text-center mb-3">Verify Registration OTP</h4>

<input
type="text"
name="otp"
class="form-control mb-3"
placeholder="Enter OTP sent to your email"
required>

<button class="btn btn-primary w-100">

Verify OTP

</button>

<div class="resend">

<span id="timer">Resend OTP in 60s</span>

<br>

<a id="resendBtn"
href="/resend-registration-otp"
style="display:none;">

Resend OTP

</a>

</div>

</form>


<script>

let seconds = 60;

const timer = document.getElementById("timer");

const resendBtn = document.getElementById("resendBtn");

const countdown = setInterval(() => {

seconds--;

timer.textContent = "Resend OTP in " + seconds + "s";

if(seconds <= 0){

clearInterval(countdown);

timer.style.display = "none";

resendBtn.style.display = "inline";

}

},1000);

</script>

</body>
</html>
