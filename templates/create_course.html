{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">

<h2>Create Course</h2>

<form method="POST" enctype="multipart/form-data">

<label>Course Title</label>
<input name="title" class="form-control mb-3">

<label>Description</label>
<textarea name="description" class="form-control mb-3"></textarea>

<label>Upload Course Video</label>
<input type="file" name="video" class="form-control mb-3">

<label>Upload Notes (PDF)</label>
<input type="file" name="notes" class="form-control mb-3">

<button class="btn btn-success">Create Course</button>

</form>

</div>

{% endblock %}
