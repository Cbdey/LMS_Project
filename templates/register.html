<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>E-Learning LMS Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e6eef8,#cbdff6);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* soft floating background */

.bg-shape{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.45;
z-index:0;
}

.shape1{
width:300px;
height:300px;
background:#7aa9ff;
top:-60px;
left:-60px;
}

.shape2{
width:240px;
height:240px;
background:#9cc0ff;
bottom:-50px;
right:-40px;
}

/* main container */

.wrapper{
width:880px;
min-height:440px;
background:white;
border-radius:24px;
box-shadow:0 30px 70px rgba(0,0,0,.12);
display:flex;
overflow:hidden;
z-index:2;
}

/* form section */

.register-panel{
width:45%;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* illustration panel */

.illustration-panel{
width:55%;
background:linear-gradient(135deg,#dbeafe,#bfdbfe);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:18px;
}

/* cards */

.learn-card{
background:white;
padding:16px 22px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
width:260px;
font-weight:500;
}

/* header */

.portal-title{
display:flex;
align-items:center;
gap:10px;
margin-bottom:16px;
}

.portal-icon{
width:38px;
height:38px;
background:#3b82f6;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.portal-text{
font-size:14px;
font-weight:600;
color:#1e3a8a;
}

/* heading */

.heading{
font-size:26px;
font-weight:700;
color:#1e40af;
}

.subheading{
font-size:14px;
color:#64748b;
margin-bottom:16px;
}

/* inputs */

.form-control{
border-radius:12px;
padding:12px;
border:1px solid #e2e8f0;
}

.form-control:focus{
border-color:#3b82f6;
box-shadow:0 0 0 2px rgba(59,130,246,.15);
}

/* button */

.register-btn{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:linear-gradient(to right,#2563eb,#3b82f6);
color:white;
font-weight:600;
transition:.3s;
}

.register-btn:hover{
background:linear-gradient(to right,#1d4ed8,#2563eb);
}

/* footer */

.login-link{
margin-top:14px;
text-align:center;
font-size:14px;
}

.login-link a{
color:#2563eb;
font-weight:500;
text-decoration:none;
}

</style>

</head>

<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>


<div class="wrapper">

<!-- LEFT REGISTER FORM -->

<form method="POST" class="register-panel">

<div class="portal-title">
<div class="portal-icon">+</div>
<div class="portal-text">E-Learning Portal</div>
</div>

<div class="heading">Create Account</div>

<div class="subheading">
Join the learning platform today 🚀
</div>


<label>Username</label>
<input type="text"
name="username"
class="form-control mb-2"
required>


<label>Email</label>
<input type="email"
name="email"
class="form-control mb-2"
required>


<label>Password</label>
<input type="password"
name="password"
class="form-control mb-2"
required>


<label>Select Role</label>
<select name="role" class="form-control mb-3">

<option value="student">Student</option>
<option value="instructor">Instructor</option>
<option value="admin">Admin</option>

</select>


<button class="register-btn">
Create Account
</button>


<div class="login-link">
Already registered?
<a href="/login">Login</a>
</div>

</form>


<!-- RIGHT ILLUSTRATION PANEL -->

<div class="illustration-panel">

<div class="learn-card">
📚 Access structured learning content
</div>

<div class="learn-card">
🎥 Watch instructor video lectures
</div>

<div class="learn-card">
📊 Track progress & earn certificates
</div>

</div>

</div>

</body>
</html>
