<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>E-Learning LMS Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e6eef8,#cbdff6);
display:flex;
align-items:center;
justify-content:center;
}

/* soft background glow */

.bg-circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.35;
z-index:0;
}

.c1{
width:260px;
height:260px;
background:#7aa9ff;
top:-40px;
left:-40px;
}

.c2{
width:220px;
height:220px;
background:#9cc0ff;
bottom:-30px;
right:-30px;
}

/* main container */

.wrapper{
width:880px;
min-height:440px;
background:white;
border-radius:24px;
box-shadow:0 30px 70px rgba(0,0,0,.12);
display:flex;
overflow:hidden;
z-index:2;
}

/* LEFT LOGIN PANEL */

.login-panel{
width:50%;
padding:38px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* RIGHT ILLUSTRATION PANEL */

.illustration-panel{
width:50%;
background:linear-gradient(135deg,#dbeafe,#bfdbfe);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
}

/* illustration image */

.illustration-panel img{
width:210px;
margin-bottom:14px;
}

/* illustration text */

.illustration-title{
font-size:20px;
font-weight:600;
color:#1e40af;
margin-bottom:6px;
}

.illustration-sub{
font-size:14px;
color:#475569;
max-width:260px;
}

/* header */

.portal-title{
display:flex;
align-items:center;
gap:10px;
margin-bottom:14px;
}

.portal-icon{
width:36px;
height:36px;
background:#3b82f6;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.portal-text{
font-size:14px;
font-weight:600;
color:#1e3a8a;
}

/* headings */

.heading{
font-size:26px;
font-weight:700;
color:#1e40af;
}

.subheading{
font-size:14px;
color:#64748b;
margin-bottom:14px;
}

/* inputs */

.form-control{
border-radius:10px;
padding:11px;
border:1px solid #e2e8f0;
}

.form-control:focus{
border-color:#3b82f6;
box-shadow:0 0 0 2px rgba(59,130,246,.15);
}

/* button */

.login-btn{
width:100%;
padding:11px;
border-radius:10px;
border:none;
background:linear-gradient(to right,#2563eb,#3b82f6);
color:white;
font-weight:600;
transition:.3s;
}

.login-btn:hover{
background:linear-gradient(to right,#1d4ed8,#2563eb);
}

/* links */

.extra{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
}

.extra a{
text-decoration:none;
color:#2563eb;
}

.signup{
margin-top:12px;
text-align:center;
font-size:14px;
}

.signup a{
color:#2563eb;
font-weight:500;
text-decoration:none;
}

</style>

</head>

<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="wrapper">

<!-- LOGIN PANEL -->

<form method="POST" class="login-panel">

<div class="portal-title">
<div class="portal-icon">✓</div>
<div class="portal-text">E-Learning Portal</div>
</div>

<div class="heading">Welcome Back!</div>

<div class="subheading">
Sign in to continue learning 📘
</div>

<label>Email</label> <input type="email" name="email" class="form-control mb-2" required>

<label>Password</label> <input type="password" name="password" class="form-control" required>

<div class="extra">

<label>
<input type="checkbox"> Remember me
</label>

<a href="/forgot-password">
Forgot Password?
</a>

</div>

<button class="login-btn mt-3">
Sign In
</button>

<div class="signup">
Don't have an account?
<a href="/register">Sign Up</a>
</div>

</form>

<!-- ILLUSTRATION PANEL -->

<div class="illustration-panel">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">

<div class="illustration-title">
Learn Anytime, Anywhere 📚
</div>

<div class="illustration-sub">
Access courses, lectures, quizzes and certificates inside one smart LMS platform.
</div>

</div>

</div>

</body>
</html>
